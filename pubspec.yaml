name: mistake_tracker
description: Log everyday failures. Surface patterns, costs, and prevention suggestions.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management + DI
  flutter_riverpod: ^2.5.1

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3

  # Export
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
